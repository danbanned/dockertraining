#the first thing we do is add our version which tells docker which compose file format version were using 

services: #is what holds our containers 
  db: #this is tghe name of our container, so inside services we specify what containers it holds, db is our database container
   
  #service name = hostname in docker, i think our db is the service name, meaning services and container are one 
    image: postgres:15-alpine #pulls official postgres version 15 image from 
    
    ports:
      - "5432:5432"
    #docker already has prebuilt linux images that your container can use instead of the user manually installign it.
    restart: always #automatically restart the container if it crashes 

    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER} #database is given a username
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} #database is assigned a password 
      POSTGRES_DB: ${POSTGRES_DB} #then we give it a name so when we are ready to start the database this is what runs it 
    volumes:
      - postgres_data:/var/lib/postgresql/data #saves database files
      # to a named volume (persistent storage)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mydb"] #checks to see if postgres is ready to accept connections 
      interval: 5s #check every 5 seconds 
      timeout: 5s #fail if no response in 5 seconds
      retries: 10 #try 5 times before marking unhealthy
      #our health check runs a series of commands like interval wich checks every 5 secons
      #and timeout which failes the test after 5 seconds
      #we do all this to see if the database is reachable before proceeding forward and to add flags 

  app: #this is your Node/Next backend container 
    image: danny1026/app
    #built locally 

    build: . #builds dockerfile from the current directory thats what the periods for 

    env_file:
      - .env
      # connects to postgres using one of our service names which is our "db"
      # use postgresql://username=postgres:password=postgres@host=db:port=5432/database name=appdb
      # because docker creates a private network containers talk to ecahother using service names 

    ports:
      - "80:3000" #maps port 300 inside the container to port 300 on your host machine
      #this allows you to access the app in your browser at localhost:3000 we arae not connecting serevrs we are just exposing 
      #the containers port to our local machine 
    depends_on:
      db: 
        condition: service_healthy #waits until our health check on the db passes before starting the container 

    
    restart: always #automatically restart the container if it crashes 
    healthcheck:
      # The command Docker runs to determine if the container is healthy.
      # "CMD" means run the command directly (not through a shell).
      # wget --spider checks if the URL is reachable without downloading content.
      # -q makes it quiet (no output).
      # If http://localhost:3000 responds successfully, the container is marked healthy.
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]

      # How often Docker runs the health check.
      # Every 10 seconds, Docker will execute the test command.
      interval: 10s

      # Maximum time Docker will wait for the test command to complete.
      # If the command takes longer than 5 seconds, it is considered a failure.
      timeout: 5s

      # Number of consecutive failures allowed before marking the container as "unhealthy".
      # If the test fails 5 times in a row, Docker changes the container status to unhealthy.
      retries: 5

      # Grace period after the container starts before counting failures.
      # During these first 10 seconds, failures do NOT count toward retries.
      # This gives your app time to boot up before being judged unhealthy.
      start_period: 10s

volumes:
  postgres_data: #declares the named volume that we saved our database files in so docker creates it properly 

