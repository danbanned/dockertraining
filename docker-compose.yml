=======
services: #is what holds our containers 
  db: #this is tghe name of our container, so inside services we specify what containers it holds, db is our database container 
  #service name = hostname in docker, i think our db is the service name, meaning services and container are one 
    image: postgres:15 #pulls official postgres version 15 image from dockerhub
    #docker already has prebuilt linux images that your container can use instead of the user manually installign it.
    restart: always #automatically restart the container if it crashes 
    environment: 
      POSTGRES_USER: postgres #database is given a username
      POSTGRES_PASSWORD: postgres #database is assigned a password 
      POSTGRES_DB: appdb #then we give it a name so when we are ready to start the database this is what runs it 
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: ${DATABASE_URL?DATABASE_URL is required}
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
