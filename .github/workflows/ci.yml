# -----------------------------------------------------------
# Workflow Name - Multi-Registry Docker Deployment
# The CI/CD pipeline builds a Docker image once and publishes it to both
# Amazon ECR and GitHub Container Registry (GHCR). This allows different
# deployment environments to pull the image from their preferred registry.
# -----------------------------------------------------------
name: CI


# -----------------------------------------------------------
# Permissions - Added security-events for CodeQL
# -----------------------------------------------------------
permissions:
  contents: read
  packages: write           # For GHCR
  security-events: write    # Required for CodeQL to upload SARIF results
  actions: read             # Required for actions/upload-artifact


# -----------------------------------------------------------
# Concurrency Control
# -----------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


# -----------------------------------------------------------
# When This Workflow Runs
# -----------------------------------------------------------
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
      - cron: '0 0 1 * *'  # Run monthly on the 1st
   


# -----------------------------------------------------------
# Global Environment Variables
# -----------------------------------------------------------
env:
  AWS_DEFAULT_REGION: us-east-1
  ECR_REPOSITORY: my-app
  IMAGE_TAG: ${{ github.sha }}
  EC2_INSTANCE_ID: i-0d4975574f8b5040b
  NODE_ENV: production
  APP_NAME: my-app
  BLUE_PORT: 8080
  GREEN_PORT: 8081


# -----------------------------------------------------------
# Jobs Section
# -----------------------------------------------------------
jobs:


  # ---------------------------------------------------------
  # Job Name: Test and Lint
  # ---------------------------------------------------------
  test:
    name: test-and-lint
    runs-on: ubuntu-latest
    timeout-minutes: 15


    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Create env file for tests
        run: |
          echo "POSTGRES_USER=postgres" >> .env
          echo "POSTGRES_PASSWORD=postgres" >> .env
          echo "POSTGRES_DB=mydb" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_HOST=db" >> .env
          echo "DATABASE_URL=postgresql://postgres:postgres@db:5432/mydb" >> .env


      - name: Debug branch
        run: |
           echo "Running on ref: ${{ github.ref }}"


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm


      - name: Clean install
        run: npm ci


      - name: Generate Prisma client
        run: docker compose run --rm app npx prisma generate


      - name: Run linter
        run: |
          npm uninstall eslint-plugin-react eslint-plugin-react-hooks || true
          rm -rf node_modules package-lock.json
          npm install
          npx eslint --version
          npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings=0 || true


      - name: Remove old containers
        run: docker compose down -v


      - name: Build containers
        run: docker compose build


      - name: Start services
        run: docker compose up -d


      - name: docker check services
        run: echo "docker --version && docker compose version && docker compose ps"


      - name: Wait for database
        run: |
          for i in {1..10}; do
            if docker compose exec -T db pg_isready -U postgres -d mydb; then
              echo "Database is ready ✅"
              exit 0
            fi
            echo "Waiting for database..."
            sleep 2
          done
          echo "Database failed to start ❌"
          docker compose logs db
          exit 1


      - name: Run migrations
        env:
          NODE_OPTIONS: "--max-old-space-size=512"
          DATABASE_URL: postgresql://postgres:postgres@db:5432/mydb?schema=public
        run: docker compose run --rm app npx prisma migrate deploy
     
      - name: Run tests
        run: docker compose exec -T app npm test


      - name: Create test results directory
        if: always()
        run: mkdir -p test-results


      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7


      - name: Tear down
        if: always()
        run: docker compose down -v


  # -----------------------------------------------------
  # Job Name: Build Application & Push Docker Image
  # -----------------------------------------------------
  build:
    name: Build app
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20


    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ github.ref }}-
            ${{ runner.os }}-buildx-


      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin


      - name: Build, tag, and push docker image to GHCR
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in current directory:"
          ls -la
         
          docker buildx build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new \
            --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --platform linux/amd64 \
            -t ghcr.io/${{ github.repository }}:$IMAGE_TAG \
            -t ghcr.io/${{ github.repository }}:latest \
            --push \
            .
         
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache


      - name: Scan docker image for vulnerabilities
        id: trivy-scan
        if: success()
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'


      - name: Upload Trivy scan results to GitHub Security tab
        if: always() && steps.trivy-scan.outcome == 'success' && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'


      - name: Upload Trivy scan artifact
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 7


  # -----------------------------------------------------
  # Job Name: Deploy to EC2 - Blue-Green Deployment
  # -----------------------------------------------------
  deploy-ec2:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    environment: production


    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}


      - name: Get or create EC2 instance
        id: ensure-instance
        env:
          KEY_NAME: ${{ secrets.EC2_KEY_NAME }}
        run: |
          if [ -z "$KEY_NAME" ]; then
            echo "❌ ERROR: EC2_KEY_NAME secret is not set!"
            exit 1
          fi
          
          echo "Using key pair: $KEY_NAME"
          
          # Check if key exists in AWS
          if ! aws ec2 describe-key-pairs --key-names "$KEY_NAME" &>/dev/null; then
            echo "❌ ERROR: Key pair '$KEY_NAME' not found in AWS!"
            echo "Available key pairs:"
            aws ec2 describe-key-pairs --query 'KeyPairs[*].KeyName' --output table
            exit 1
          fi
          
          # Try to find existing instance
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=my-app-production" "Name=instance-state-name,Values=running,stopped" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          
          # Check if instance exists and has correct key
          NEEDS_RECREATION=false
          
          if [ "$INSTANCE_ID" != "None" ] && [ -n "$INSTANCE_ID" ]; then
            echo "Found existing instance: $INSTANCE_ID"
            
            # Check the key of the existing instance
            INSTANCE_KEY=$(aws ec2 describe-instances \
              --instance-ids $INSTANCE_ID \
              --query 'Reservations[0].Instances[0].KeyName' \
              --output text)
            
            echo "Instance key: $INSTANCE_KEY"
            echo "Desired key: $KEY_NAME"
            
            if [ "$INSTANCE_KEY" != "$KEY_NAME" ]; then
              echo "⚠️ Key mismatch! Instance uses '$INSTANCE_KEY' but workflow expects '$KEY_NAME'"
              NEEDS_RECREATION=true
            else
              echo "✅ Instance uses correct key"
            fi
          else
            echo "No existing instance found"
            NEEDS_RECREATION=true
          fi
          
          # Recreate instance if needed
          if [ "$NEEDS_RECREATION" = true ]; then
            if [ "$INSTANCE_ID" != "None" ] && [ -n "$INSTANCE_ID" ]; then
              echo "Terminating old instance: $INSTANCE_ID"
              aws ec2 terminate-instances --instance-ids $INSTANCE_ID
              aws ec2 wait instance-terminated --instance-ids $INSTANCE_ID
              echo "✅ Old instance terminated"
            fi
            
            echo "Creating new instance with key: $KEY_NAME"
            
            INSTANCE_ID=$(aws ec2 run-instances \
              --image-id ami-0b6c6ebed2801a5cb \
              --count 1 \
              --instance-type t2.micro \
              --key-name "$KEY_NAME" \
              --security-group-ids sg-0b971c14bd9b10e26 \
              --subnet-id subnet-0b66a114f97a51d2d \
              --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=my-app-production},{Key=Environment,Value=production},{Key=CreatedBy,Value=github-actions},{Key=Project,Value=my-app}]' \
              --query 'Instances[0].InstanceId' \
              --output text)
            
            echo "✅ Created new instance: $INSTANCE_ID"
            
            # Wait for instance to be ready
            aws ec2 wait instance-running --instance-ids $INSTANCE_ID
            echo "Waiting 30 seconds for SSH to be ready..."
            sleep 30
          else
            # Ensure instance is running
            STATE=$(aws ec2 describe-instances \
              --instance-ids $INSTANCE_ID \
              --query 'Reservations[0].Instances[0].State.Name' \
              --output text)
            
            if [ "$STATE" != "running" ]; then
              echo "Starting instance (current state: $STATE)"
              aws ec2 start-instances --instance-ids $INSTANCE_ID
              aws ec2 wait instance-running --instance-ids $INSTANCE_ID
              sleep 10
            fi
          fi
          
          # Get public IP
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          
          # If no public IP, allocate Elastic IP
          if [ "$PUBLIC_IP" = "None" ] || [ -z "$PUBLIC_IP" ]; then
            echo "No public IP found. Allocating Elastic IP..."
            ALLOC_ID=$(aws ec2 allocate-address --domain vpc --query 'AllocationId' --output text)
            aws ec2 associate-address --instance-id $INSTANCE_ID --allocation-id $ALLOC_ID
            PUBLIC_IP=$(aws ec2 describe-addresses --allocation-ids $ALLOC_ID --query 'Addresses[0].PublicIp' --output text)
            echo "✅ Allocated Elastic IP: $PUBLIC_IP"
          fi
          
          # Save to environment
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo "EC2_HOST=$PUBLIC_IP" >> $GITHUB_ENV
          
          echo "=== Instance Ready ==="
          echo "Instance ID: $INSTANCE_ID"
          echo "Public IP: $PUBLIC_IP"
          echo "Key Pair: $KEY_NAME"


      - name: Get EC2 public IP
        run: |
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
         
          if [ "$PUBLIC_IP" = "None" ] || [ -z "$PUBLIC_IP" ]; then
            echo "No public IP found. Allocating Elastic IP..."
            ALLOC_ID=$(aws ec2 allocate-address --domain vpc --query 'AllocationId' --output text)
            aws ec2 associate-address --instance-id $INSTANCE_ID --allocation-id $ALLOC_ID
            PUBLIC_IP=$(aws ec2 describe-addresses --allocation-ids $ALLOC_ID --query 'Addresses[0].PublicIp' --output text)
            echo "✅ Allocated Elastic IP: $PUBLIC_IP"
          fi
         
          echo "EC2_HOST=$PUBLIC_IP" >> $GITHUB_ENV
          echo "✅ EC2 IP: $PUBLIC_IP"


      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Write the private key - the secret will be masked in logs
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          
          # Remove any Windows line endings if present
          sed -i 's/\r$//' ~/.ssh/id_rsa
          
          chmod 600 ~/.ssh/id_rsa
          
          # Add host to known_hosts
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          # Validate the key
          if ! ssh-keygen -l -f ~/.ssh/id_rsa > /dev/null 2>&1; then
            echo "❌ Invalid SSH private key format"
            echo "First line: $(head -1 ~/.ssh/id_rsa)"
            exit 1
          fi
          
          echo "✅ SSH key validated successfully"


      - name: Determine correct SSH user
        id: ssh-user
        run: |
          AMI_ID=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].ImageId' \
            --output text)
          
          AMI_DESC=$(aws ec2 describe-images --image-ids $AMI_ID --query 'Images[0].Description' --output text)
          echo "AMI Description: $AMI_DESC"
          
          if [[ "$AMI_DESC" == *"Ubuntu"* ]] || [[ "$AMI_DESC" == *"ubuntu"* ]]; then
            SSH_USER="ubuntu"
          elif [[ "$AMI_DESC" == *"Amazon Linux"* ]] || [[ "$AMI_DESC" == *"amzn"* ]]; then
            SSH_USER="ec2-user"
          elif [[ "$AMI_DESC" == *"RHEL"* ]] || [[ "$AMI_DESC" == *"rhel"* ]]; then
            SSH_USER="ec2-user"
          else
            SSH_USER="ubuntu"
          fi
          
          echo "SSH_USER=$SSH_USER" >> $GITHUB_OUTPUT
          echo "Will use SSH user: $SSH_USER"


      - name: Check instance key pair
        run: |
          INSTANCE_KEY=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].KeyName' \
            --output text)
          
          echo "Instance is using key pair: $INSTANCE_KEY"
          echo "Your GitHub secret EC2_KEY_NAME is: ${{ secrets.EC2_KEY_NAME }}"
          
          if [ "$INSTANCE_KEY" != "${{ secrets.EC2_KEY_NAME }}" ]; then
            echo "❌ Key mismatch! The instance requires key: $INSTANCE_KEY"
            exit 1
          else
            echo "✅ Key names match!"
          fi


      - name: Debug EC2 instance details
        run: |
          echo "=== EC2 Instance Details ==="
          aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].{KeyName:KeyName,State:State.Name,PublicDnsName:PublicDnsName,ImageId:ImageId}' \
            --output table


      - name: Debug SSH key
        run: |
          ls -la ~/.ssh/
          file ~/.ssh/id_rsa
          echo "SSH key file exists and has correct permissions"


      - name: Debug SSH configuration
        run: |
          echo "=== EC2 Instance Info ==="
          aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].{KeyName:KeyName,State:State.Name,PublicIp:PublicIpAddress}' \
            --output table
          
          echo "=== SSH Key Info ==="
          echo "SSH key file exists: $(test -f ~/.ssh/id_rsa && echo 'Yes' || echo 'No')"
          echo "SSH key permissions: $(stat -c %a ~/.ssh/id_rsa)"
          echo "=== Testing key format ==="
          head -1 ~/.ssh/id_rsa


      - name: Test SSH connection
        run: |
          SSH_USER="${{ steps.ssh-user.outputs.SSH_USER }}"
          echo "Testing SSH connection with user: $SSH_USER"
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 $SSH_USER@$EC2_HOST "echo 'SSH connection successful'"


      - name: Install Docker and Docker Compose on EC2
        run: |
          SSH_USER="${{ steps.ssh-user.outputs.SSH_USER }}"
          
          ssh -o StrictHostKeyChecking=no $SSH_USER@$EC2_HOST "
            if ! command -v docker; then
              if command -v apt; then
                sudo apt update
                sudo apt install docker.io -y
              elif command -v yum; then
                sudo yum install docker -y
              elif command -v dnf; then
                sudo dnf install docker -y
              fi
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $SSH_USER
            else
              echo 'Docker already installed'
            fi
           
            if ! command -v docker-compose; then
              sudo curl -L 'https://github.com/docker/compose/releases/download/v2.23.0/docker-compose-$(uname -s)-$(uname -m)' -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            else
              echo 'Docker Compose already installed'
            fi
           
            mkdir -p ~/app
          "


      - name: Create Docker Compose files for blue-green deployment
        run: |
          SSH_USER="${{ steps.ssh-user.outputs.SSH_USER }}"
          
          ssh $SSH_USER@$EC2_HOST "
          tee ~/app/docker-compose.blue.yml > /dev/null << 'EOF_BLUE'
          version: '3.8'
          services:
            app:
              image: ghcr.io/${{ github.repository }}:$IMAGE_TAG
              container_name: my-app-blue
              restart: unless-stopped
              ports:
                - '${{ env.BLUE_PORT }}:3000'
              environment:
                - NODE_ENV=${{ env.NODE_ENV }}
                - DATABASE_URL=${{ secrets.DATABASE_URL }}
                - JWT_SECRET=${{ secrets.JWT_SECRET }}
              networks:
                - app-network
              healthcheck:
                test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 40s
          networks:
            app-network:
              driver: bridge
          EOF_BLUE

          tee ~/app/docker-compose.green.yml > /dev/null << 'EOF_GREEN'
          version: '3.8'
          services:
            app:
              image: ghcr.io/${{ github.repository }}:$IMAGE_TAG
              container_name: my-app-green
              restart: unless-stopped
              ports:
                - '${{ env.GREEN_PORT }}:3000'
              environment:
                - NODE_ENV=${{ env.NODE_ENV }}
                - DATABASE_URL=${{ secrets.DATABASE_URL }}
                - JWT_SECRET=${{ secrets.JWT_SECRET }}
              networks:
                - app-network
              healthcheck:
                test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 40s
          networks:
            app-network:
              driver: bridge
          EOF_GREEN

          tee ~/app/docker-compose.prod.yml > /dev/null << 'EOF_PROD'
          version: '3.8'
          services:
            app:
              image: ghcr.io/${{ github.repository }}:latest
              container_name: my-app-prod
              restart: unless-stopped
              ports:
                - '80:3000'
              environment:
                - NODE_ENV=${{ env.NODE_ENV }}
                - DATABASE_URL=${{ secrets.DATABASE_URL }}
                - JWT_SECRET=${{ secrets.JWT_SECRET }}
              networks:
                - app-network
              healthcheck:
                test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 40s
          networks:
            app-network:
              driver: bridge
          EOF_PROD

          tee ~/app/nginx.conf > /dev/null << 'EOF_NGINX'
          events {
              worker_connections 1024;
          }
          http {
              upstream app_backend {
                  server localhost:${{ env.BLUE_PORT }};
                  server localhost:${{ env.GREEN_PORT }};
              }
              server {
                  listen 80;
                  location / {
                      proxy_pass http://app_backend;
                      proxy_set_header Host \$host;
                      proxy_set_header X-Real-IP \$remote_addr;
                      proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto \$scheme;
                  }
                  location /health {
                      access_log off;
                      return 200 'healthy\n';
                      add_header Content-Type text/plain;
                  }
              }
          }
          EOF_NGINX
          "


      - name: Blue-Green Deployment with Docker Compose
        run: |
          SSH_USER="${{ steps.ssh-user.outputs.SSH_USER }}"
          
          ssh $SSH_USER@$EC2_HOST "
            set -e
           
            echo '🔑 Logging into GHCR...'
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
           
            echo '📦 Pulling new image...'
            docker pull ghcr.io/${{ github.repository }}:$IMAGE_TAG
           
            echo '🗄️ Running database migrations...'
            docker run --rm \
              --network host \
              -e DATABASE_URL=\"${{ secrets.DATABASE_URL }}\" \
              ghcr.io/${{ github.repository }}:$IMAGE_TAG \
              npx prisma migrate deploy
           
            if [ -f ~/app/active.txt ]; then
              ACTIVE=\$(cat ~/app/active.txt)
            else
              ACTIVE=\"green\"
            fi
           
            echo \"🔄 Current active environment: \$ACTIVE\"
           
            if [ \"\$ACTIVE\" = \"blue\" ]; then
              NEW_ENV=\"green\"
              NEW_PORT=${{ env.GREEN_PORT }}
              NEW_COMPOSE=\"docker-compose.green.yml\"
            else
              NEW_ENV=\"blue\"
              NEW_PORT=${{ env.BLUE_PORT }}
              NEW_COMPOSE=\"docker-compose.blue.yml\"
            fi
           
            echo \"🚀 Deploying new version to \$NEW_ENV environment...\"
           
            sed -i \"s|image: ghcr.io/${{ github.repository }}:.*|image: ghcr.io/${{ github.repository }}:$IMAGE_TAG|\" ~/app/\$NEW_COMPOSE
           
            cd ~/app
            docker-compose -f \$NEW_COMPOSE up -d
           
            echo \"⏳ Waiting for new container to be ready...\"
            sleep 15
           
            echo \"🏥 Performing health check on port \$NEW_PORT...\"
            HEALTHY=false
            for i in {1..30}; do
              if curl -f http://localhost:\$NEW_PORT/health; then
                HEALTHY=true
                echo \"✅ Health check passed for \$NEW_ENV environment\"
                break
              fi
              echo \"Waiting for health check... attempt \$i/30\"
              sleep 2
            done
           
            if [ \"\$HEALTHY\" = true ]; then
              echo \"✅ New deployment healthy, switching traffic...\"
             
              sed -i \"s|image: ghcr.io/${{ github.repository }}:.*|image: ghcr.io/${{ github.repository }}:$IMAGE_TAG|\" ~/app/docker-compose.prod.yml
             
              if [ \"\$ACTIVE\" = \"blue\" ]; then
                OLD_ENV=\"green\"
                OLD_COMPOSE=\"docker-compose.green.yml\"
              else
                OLD_ENV=\"blue\"
                OLD_COMPOSE=\"docker-compose.blue.yml\"
              fi
             
              echo \"\$NEW_ENV\" > ~/app/active.txt
             
              echo \"🛑 Stopping old \$OLD_ENV environment...\"
              cd ~/app
              docker-compose -f \$OLD_COMPOSE down || true
             
              echo \"✅ Blue-green deployment completed successfully!\"
              echo \"📝 Active environment: \$NEW_ENV\"
            else
              echo \"❌ Health check failed for \$NEW_ENV environment\"
              echo \"🔄 Rolling back...\"
             
              cd ~/app
              docker-compose -f \$NEW_COMPOSE down
             
              echo \"❌ Deployment failed - rolled back to previous version\"
              exit 1
            fi
           
            docker image prune -a --filter 'until=24h' -f
          "


      - name: Verify final deployment
        run: |
          SSH_USER="${{ steps.ssh-user.outputs.SSH_USER }}"
          
          sleep 5
          ssh $SSH_USER@$EC2_HOST "
            echo '📊 Checking running containers:'
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
           
            if [ -f ~/app/active.txt ]; then
              ACTIVE=\$(cat ~/app/active.txt)
              echo \"✅ Active environment: \$ACTIVE\"
            fi
           
            if curl -f http://localhost/health; then
              echo '✅ Production endpoint is healthy'
            else
              echo '⚠️ Production health check failed'
            fi
          "
         
          curl -f http://$EC2_HOST/health && echo "✅ Health check passed at http://$EC2_HOST/health" || echo "⚠️ Health check endpoint not available"
          echo "✅ Deployed at http://$EC2_HOST"


      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa


  # -----------------------------------------------------
  # Job Name: Cleanup orphaned instances (Monthly)
  # -----------------------------------------------------
  cleanup-orphaned:
    name: Cleanup orphaned instances
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: []
   
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}
     
      - name: Find and list old instances without proper tags
        run: |
          echo "Looking for instances older than 7 days without proper tags..."
         
          OLD_INSTANCES=$(aws ec2 describe-instances \
            --filters "Name=instance-state-name,Values=running,stopped" \
            --query 'Reservations[].Instances[?!(Tags[?Key==`Name`&&Value==`my-app-production`])].[InstanceId,LaunchTime,Tags[?Key==`Name`].Value|[0]]' \
            --output text)
         
          if [ ! -z "$OLD_INSTANCES" ]; then
            echo "⚠️ Found orphaned instances:"
            echo "$OLD_INSTANCES"
            echo ""
            echo "To terminate these instances, run:"
            echo "aws ec2 terminate-instances --instance-ids <ids>"
          else
            echo "✅ No orphaned instances found"
          fi