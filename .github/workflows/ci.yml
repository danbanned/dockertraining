# -----------------------------------------------------------
# Workflow Name
# -----------------------------------------------------------
name: CI

# -----------------------------------------------------------
# When This Workflow Runs
# -----------------------------------------------------------
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# -----------------------------------------------------------
# Global Environment Variables
# -----------------------------------------------------------
env:
  AWS_DEFAULT_REGION: us-east-1
  ECR_REPOSITORY: my-app
  IMAGE_TAG: ${{ github.sha }}
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: mydb
  DATABASE_URL: postgresql://postgres:postgres@db:5432/mydb

# -----------------------------------------------------------
# Jobs Section
# -----------------------------------------------------------
jobs:

  # ---------------------------------------------------------
  # Job Name: Test, Build and Lint
  # ---------------------------------------------------------
  test:
    name: build-and-test-and-lint
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------
      # Step 1: Checkout Repository
      # -----------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------
      # Step 2: Create .env file for docker-compose
      # -----------------------------------------------------
      - name: Create env file
        run: |
          echo "POSTGRES_USER=postgres" > .env
          echo "POSTGRES_PASSWORD=postgres" >> .env
          echo "POSTGRES_DB=mydb" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_HOST=db" >> .env
          echo "DATABASE_URL=postgresql://postgres:postgres@db:5432/mydb" >> .env
          echo "NODE_ENV=test" >> .env

      # -----------------------------------------------------
      # Step 3: Debug branch
      # -----------------------------------------------------
      - name: Debug branch
        run: |
          echo "Running on ref: ${{ github.ref }}"

      # -----------------------------------------------------
      # Step 4: Setup Node.js
      # -----------------------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # -----------------------------------------------------
      # Step 5: Install Dependencies
      # -----------------------------------------------------
      - name: Clean install
        run: npm ci

      # -----------------------------------------------------
      # Step 6: Generate Prisma Client
      # -----------------------------------------------------
      - name: Generate Prisma client
        run: npx prisma generate

      # -----------------------------------------------------
      # Step 7: Run lint
      # -----------------------------------------------------
      - name: Run linter
        run: npm run lint

      # -----------------------------------------------------
      # Step 8: Build and Start Docker Containers
      # -----------------------------------------------------
      - name: Remove old containers
        run: docker compose down -v

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      # -----------------------------------------------------
      # Step 9: Wait for Database
      # -----------------------------------------------------
      - name: Wait for database
        run: |
          timeout 30s sh -c 'until docker compose exec -T db pg_isready -U postgres; do echo "Waiting for database..."; sleep 2; done'

      # -----------------------------------------------------
      # Step 10: Run Prisma Migrations
      # -----------------------------------------------------
      - name: Run migrations
        run: docker compose exec -T app npx prisma migrate deploy

      # -----------------------------------------------------
      # Step 11: Run Tests
      # -----------------------------------------------------
      - name: Run tests
        run: docker compose exec -T app npm test

      # -----------------------------------------------------
      # Step 12: Tear Down
      # -----------------------------------------------------
      - name: Tear down
        if: always()
        run: docker compose down -v

  # -----------------------------------------------------
  # Job Name: Build Application & Push Docker Image
  # -----------------------------------------------------
  build:
    name: Build app
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run build 
        run: npm run build

      - name: Configure AWS credentials 
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR 
        id: login-ecr 
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Dockerfile.prod .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Scan docker image for vulnerabilities 
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # -----------------------------------------------------
  # Job Name: Deploy to ECS
  # -----------------------------------------------------
  deploy:
    name: Deploy to ECS 
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Fill in the new image ID in the Amazon ECS task definition 
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-definition.json
          container-name: my-app
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Deploy to Amazon ECS service 
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: my-app-service
          cluster: my-app-cluster
          wait-for-service-stability: true