  # -----------------------------------------------------
  # Job Name: Deploy to EC2 (ACTIVE) - Using Docker Compose with Blue-Green Deployment
  # -----------------------------------------------------
  # Purpose: Deploy Docker container to EC2 with zero-downtime blue-green strategy
  # Only runs after build completes successfully on main branch pushes
  deploy-ec2:
    name: Deploy to EC2
    needs: build  # Wait for build job to complete
    runs-on: ubuntu-latest
    # ONLY run on pushes to main (production deployments)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    environment: production  # Requires approval if environment rules are set

    steps:
      # Step 1: Checkout code (needed for any local files)
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Configure AWS CLI with credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      # Step 3: Find existing EC2 instance or create a new one
      - name: Get or create EC2 instance
        id: ensure-instance  # ID for referencing outputs
        env:
          KEY_NAME: ${{ secrets.EC2_KEY_NAME }}  # SSH key pair name
        run: |
          # Debug: Check if secret is available
          if [ -z "$KEY_NAME" ]; then
            echo "❌ ERROR: EC2_KEY_NAME secret is not set!"
            echo "Please add it to GitHub Secrets: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          
          # Try to find existing instance by tag "Name=my-app-production"
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=my-app-production" "Name=instance-state-name,Values=running,stopped" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          
          # If no instance found, create a new one
          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "No existing instance found. Creating new one..."
            
            # Verify the key pair exists in AWS
            if ! aws ec2 describe-key-pairs --key-names "$KEY_NAME" &>/dev/null; then
              echo "❌ ERROR: Key pair '$KEY_NAME' not found in AWS!"
              echo "Available key pairs:"
              aws ec2 describe-key-pairs --query 'KeyPairs[*].KeyName' --output table
              exit 1
            fi 
            
            # Launch new EC2 instance with provided AMI, security group, subnet
            INSTANCE_ID=$(aws ec2 run-instances \
              --image-id ami-0b6c6ebed2801a5cb \  # AMI provided by manager
              --count 1 \  # Single instance
              --instance-type t2.micro \  # Free tier eligible
              --key-name "$KEY_NAME" \  # SSH key for access
              --security-group-ids sg-0b971c14bd9b10e26 \  # Security group from manager
              --subnet-id subnet-0b66a114f97a51d2d \  # Subnet from manager
              --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=my-app-production},{Key=Environment,Value=production},{Key=CreatedBy,Value=github-actions},{Key=Project,Value=my-app}]' \
              --query 'Instances[0].InstanceId' \
              --output text)
            
            echo "✅ Created new instance: $INSTANCE_ID"
            
            # Wait for instance to reach running state
            aws ec2 wait instance-running --instance-ids $INSTANCE_ID
            
            # Wait extra 10 seconds for SSH to be ready
            sleep 10
          else
            echo "✅ Found existing instance: $INSTANCE_ID"
          fi
          
          # Ensure instance is running (start if stopped)
          STATE=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text)
          
          if [ "$STATE" != "running" ]; then
            echo "Starting instance (current state: $STATE)"
            aws ec2 start-instances --instance-ids $INSTANCE_ID
            aws ec2 wait instance-running --instance-ids $INSTANCE_ID
            sleep 10  # Wait for SSH
          fi
          
          # Save instance ID to GitHub environment for later steps
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

      # Step 4: Get EC2 instance public IP address
      - name: Get EC2 public IP
        run: |
          # Query the public IP of the instance
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          
          # Only allocate Elastic IP if USE_ELASTIC_IP is true AND no public IP exists
          if [ "${{ env.USE_ELASTIC_IP }}" = "true" ] && ( [ "$PUBLIC_IP" = "None" ] || [ -z "$PUBLIC_IP" ] ); then
            echo "No public IP found. Allocating Elastic IP..."
            
            # Allocate a new Elastic IP
            ALLOC_ID=$(aws ec2 allocate-address --domain vpc --query 'AllocationId' --output text)
            
            # Associate Elastic IP with instance
            aws ec2 associate-address --instance-id $INSTANCE_ID --allocation-id $ALLOC_ID
            
            # Get the newly allocated IP
            PUBLIC_IP=$(aws ec2 describe-addresses --allocation-ids $ALLOC_ID --query 'Addresses[0].PublicIp' --output text)
            echo "✅ Allocated Elastic IP: $PUBLIC_IP (this IP won't change)"
          fi
          
          # Save IP to GitHub environment for later steps
          echo "EC2_HOST=$PUBLIC_IP" >> $GITHUB_ENV
          echo "✅ EC2 IP: $PUBLIC_IP"

      # Step 5: Set up SSH private key for connecting to EC2
      - name: Setup SSH
        run: |
          # Create .ssh directory with correct permissions
          mkdir -p ~/.ssh
          # Write private key from secret
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          # Set restrictive permissions (required for SSH)
          chmod 600 ~/.ssh/id_rsa
          # Add EC2 host to known_hosts to avoid host key prompt
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts

      # Step 6: Debug - verify SSH key is properly set up
      - name: Debug - Check SSH key
        run: |
          ls -la ~/.ssh/  # List .ssh directory contents
          file ~/.ssh/id_rsa  # Verify file type
          echo "SSH key file exists and has correct permissions"

      # Step 7: Test SSH connection to EC2 instance
      - name: Test SSH connection
        run: |
          # Attempt connection and echo success message
          ssh -o StrictHostKeyChecking=no ubuntu@$EC2_HOST "echo 'SSH connection successful'"

      # Step 8: Install Docker and Docker Compose on the EC2 instance
      - name: Install Docker and Docker Compose on EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@$EC2_HOST "
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              sudo apt update  # Update package list
              sudo apt install docker.io -y  # Install Docker
              sudo systemctl start docker  # Start Docker service
              sudo systemctl enable docker  # Auto-start on boot
              sudo usermod -aG docker ubuntu  # Add ubuntu user to docker group
            else
              echo 'Docker already installed'
            fi
            
            # Install Docker Compose if not present
            if ! command -v docker-compose &> /dev/null; then
              sudo curl -L 'https://github.com/docker/compose/releases/download/v2.23.0/docker-compose-$(uname -s)-$(uname -m)' -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose  # Make executable
            else
              echo 'Docker Compose already installed'
            fi
            
            # Create app directory for deployment files
            mkdir -p ~/app
          "

      # Step 9: Create Docker Compose files for blue-green deployment
      - name: Create Docker Compose files for blue-green deployment
        run: |
          ssh ubuntu@$EC2_HOST "
          # Create blue docker-compose file (runs on port 8080)
          tee ~/app/docker-compose.blue.yml > /dev/null << 'EOF_BLUE'

          version: '3.8'
          services:
            app:
              image: ghcr.io/${{ github.repository }}:$IMAGE_TAG
              container_name: my-app-blue
              restart: unless-stopped
              ports:
                - '${{ env.BLUE_PORT }}:3000'
              environment:
                - NODE_ENV=${{ env.NODE_ENV }}
                - DATABASE_URL=${{ secrets.DATABASE_URL }}
                - JWT_SECRET=${{ secrets.JWT_SECRET }}
              networks:
                - app-network
              healthcheck:
                test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 40s

          networks:
            app-network:
              driver: bridge
          EOF_BLUE

          # Create green docker-compose file (runs on port 8081)
          tee ~/app/docker-compose.green.yml > /dev/null << 'EOF_GREEN'

          version: '3.8'
          services:
            app:
              image: ghcr.io/${{ github.repository }}:$IMAGE_TAG
              container_name: my-app-green
              restart: unless-stopped
              ports:
                - '${{ env.GREEN_PORT }}:3000'
              environment:
                - NODE_ENV=${{ env.NODE_ENV }}
                - DATABASE_URL=${{ secrets.DATABASE_URL }}
                - JWT_SECRET=${{ secrets.JWT_SECRET }}
              networks:
                - app-network
              healthcheck:
                test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 40s

          networks:
            app-network:
              driver: bridge
          EOF_GREEN

          # Create production docker-compose file (active environment on port 80)
          tee ~/app/docker-compose.prod.yml > /dev/null << 'EOF_PROD'


          version: '3.8'
          services:
            app:
              image: ghcr.io/${{ github.repository }}:latest
              container_name: my-app-prod
              restart: unless-stopped
              ports:
                - '80:3000'
              environment:
                - NODE_ENV=${{ env.NODE_ENV }}
                - DATABASE_URL=${{ secrets.DATABASE_URL }}
                - JWT_SECRET=${{ secrets.JWT_SECRET }}
              networks:
                - app-network
              healthcheck:
                test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 40s

          networks:
            app-network:
              driver: bridge
          EOF_PROD

          # Create nginx config for blue-green routing (load balancer)
          tee ~/app/nginx.conf > /dev/null << 'EOF_NGINX'
          events {
              worker_connections 1024;
          }

          http {
              upstream app_backend {
                  server localhost:${{ env.BLUE_PORT }};
                  server localhost:${{ env.GREEN_PORT }};
              }

              server {
                  listen 80;
                  
                  location / {
                      proxy_pass http://app_backend;
                      proxy_set_header Host \$host;
                      proxy_set_header X-Real-IP \$remote_addr;
                      proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto \$scheme;
                  }
                  
                  location /health {
                      access_log off;
                      return 200 'healthy\n';
                      add_header Content-Type text/plain;
                  }
              }
          }
          EOF_NGINX
                    "

      # Step 10: Execute blue-green deployment
      - name: Blue-Green Deployment with Docker Compose
        run: |
          ssh ubuntu@$EC2_HOST "
            set -e  # Exit immediately if any command fails
            
            echo '🔑 Logging into GHCR...'
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo '📦 Pulling new image...'
            docker pull ghcr.io/${{ github.repository }}:$IMAGE_TAG
            
            echo '🗄️ Running database migrations...'
            docker run --rm \
              --network host \
              -e DATABASE_URL=\"${{ secrets.DATABASE_URL }}\" \
              ghcr.io/${{ github.repository }}:$IMAGE_TAG \
              npx prisma migrate deploy
            
            # Determine which environment is currently active
            if [ -f ~/app/active.txt ]; then
              ACTIVE=$(cat ~/app/active.txt)
            else
              ACTIVE=\"green\"  # Default to green if first deployment
            fi
            
            echo \"🔄 Current active environment: \$ACTIVE\"
            
            # Set new environment (OPPOSITE of active)
            if [ \"\$ACTIVE\" = \"blue\" ]; then
              NEW_ENV=\"green\"
              NEW_PORT=${{ env.GREEN_PORT }}
              NEW_COMPOSE=\"docker-compose.green.yml\"
            else
              NEW_ENV=\"blue\"
              NEW_PORT=${{ env.BLUE_PORT }}
              NEW_COMPOSE=\"docker-compose.blue.yml\"
            fi
            
            echo \"🚀 Deploying new version to \$NEW_ENV environment...\"
            
            # Update the compose file with the new image tag
            sed -i \"s|image: ghcr.io/${{ github.repository }}:.*|image: ghcr.io/${{ github.repository }}:$IMAGE_TAG|\" ~/app/\$NEW_COMPOSE
            
            # Start the new environment
            cd ~/app
            docker-compose -f \$NEW_COMPOSE up -d
            
            echo \"⏳ Waiting for new container to be ready...\"
            sleep 15
            
            # Health check the new container
            echo \"🏥 Performing health check on port \$NEW_PORT...\"
            HEALTHY=false
            for i in {1..30}; do
              if curl -f http://localhost:\$NEW_PORT/health; then
                HEALTHY=true
                echo \"✅ Health check passed for \$NEW_ENV environment\"
                break
              fi
              echo \"Waiting for health check... attempt \$i/30\"
              sleep 2
            done
            
            if [ \"\$HEALTHY\" = true ]; then
              echo \"✅ New deployment healthy, switching traffic...\"
              
              # Update the production compose file with new image
              sed -i \"s|image: ghcr.io/${{ github.repository }}:.*|image: ghcr.io/${{ github.repository }}:$IMAGE_TAG|\" ~/app/docker-compose.prod.yml
              
              # Stop old environment
              if [ \"\$ACTIVE\" = \"blue\" ]; then
                OLD_ENV=\"green\"
                OLD_COMPOSE=\"docker-compose.green.yml\"
              else
                OLD_ENV=\"blue\"
                OLD_COMPOSE=\"docker-compose.blue.yml\"
              fi
              
              # Save the new active environment
              echo \"\$NEW_ENV\" > ~/app/active.txt
              
              # Stop and remove old environment
              echo \"🛑 Stopping old \$OLD_ENV environment...\"
              cd ~/app
              docker-compose -f \$OLD_COMPOSE down || true
              
              echo \"✅ Blue-green deployment completed successfully!\"
              echo \"📝 Active environment: \$NEW_ENV\"
            else
              echo \"❌ Health check failed for \$NEW_ENV environment\"
              echo \"🔄 Rolling back...\"
              
              # Stop and remove the failed deployment
              cd ~/app
              docker-compose -f \$NEW_COMPOSE down
              
              echo \"❌ Deployment failed - rolled back to previous version\"
              exit 1
            fi
            
            # Clean up old unused Docker images
            docker image prune -a --filter 'until=24h' -f
          "

      # Step 11: Verify final deployment is working
      - name: Verify final deployment
        run: |
          sleep 5  # Brief wait for nginx to catch up
          ssh ubuntu@$EC2_HOST "
            echo '📊 Checking running containers:'
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            
            # Check which environment is active
            if [ -f ~/app/active.txt ]; then
              ACTIVE=\$(cat ~/app/active.txt)
              echo \"✅ Active environment: \$ACTIVE\"
            fi
            
            # Verify production endpoint is accessible
            if curl -f http://localhost/health; then
              echo '✅ Production endpoint is healthy'
            else
              echo '⚠️ Production health check failed'
            fi
          "
          
          # Test from outside the instance
          curl -f http://$EC2_HOST/health && echo "✅ Health check passed at http://$EC2_HOST/health" || echo "⚠️ Health check endpoint not available"
          echo "✅ Deployed at http://$EC2_HOST"

      # Step 12: Clean up SSH key from runner (security)
      - name: Cleanup
        if: always()  # Run even if deployment failed
        run: rm -f ~/.ssh/id_rsa

  # -----------------------------------------------------
  # Job Name: Cleanup orphaned instances (Monthly)
  # -----------------------------------------------------
  # Purpose: Identify and report EC2 instances that don't have proper tags
  # Runs monthly on schedule, independent of other jobs
  cleanup-orphaned:
    name: Cleanup orphaned instances
    runs-on: ubuntu-latest
    # ONLY runs on scheduled triggers (monthly)
    if: github.event_name == 'schedule'
    needs: []  # Run independently, no dependencies
    
    steps:
      # Step 1: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}
      
      # Step 2: Find and list orphaned instances
      - name: Find and list old instances without proper tags
        run: |
          echo "Looking for instances older than 7 days without proper tags..."
          
          # Find instances without the required Name tag 'my-app-production'
          OLD_INSTANCES=$(aws ec2 describe-instances \
            --filters "Name=instance-state-name,Values=running,stopped" \
            --query 'Reservations[].Instances[?!(Tags[?Key==`Name`&&Value==`my-app-production`])].[InstanceId,LaunchTime,Tags[?Key==`Name`].Value|[0]]' \
            --output text)
          
          if [ ! -z "$OLD_INSTANCES" ]; then
            echo "⚠️ Found orphaned instances:"
            echo "$OLD_INSTANCES"
            echo ""
            echo "To terminate these instances, run:"
            echo "aws ec2 terminate-instances --instance-ids <ids>"
          else
            echo "✅ No orphaned instances found"
          fi