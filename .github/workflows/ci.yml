  # -----------------------------------------------------
  # Job Name: Deploy to EC2 (ACTIVE)
  # -----------------------------------------------------
  deploy-ec2:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Launch EC2 instance
        id: launch
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id ami-0b6c6ebed2801a5cb \
            --count 1 \
            --instance-type t2.micro \
            --key-name "Ubuntu-Virtual-machine-Dannies" \
            --security-group-ids sg-0b971c14bd9b10e26 \
            --subnet-id subnet-0b66a114f97a51d2d \
            --query 'Instances[0].InstanceId' \
            --output text)

          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo "✅ Launched EC2 instance: $INSTANCE_ID"

      - name: Wait for EC2 to start
        run: |
          aws ec2 wait instance-running --instance-ids $INSTANCE_ID
          echo "✅ Instance is running"

      - name: Get EC2 public IP
        run: |
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          
          echo "EC2_HOST=$PUBLIC_IP" >> $GITHUB_ENV
          echo "✅ EC2 IP: $PUBLIC_IP"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts

      - name: Install Docker on EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@$EC2_HOST "
            sudo apt update
            sudo apt install docker.io -y
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo usermod -aG docker ubuntu
          "

      - name: Deploy container from GHCR
        run: |
          ssh ubuntu@$EC2_HOST "
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}:$IMAGE_TAG
            docker stop my-app-prod || true
            docker rm my-app-prod || true
            docker run -d \
              --name my-app-prod \
              --restart unless-stopped \
              -p 80:3000 \
              -e NODE_ENV=${{ env.NODE_ENV }} \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              ghcr.io/${{ github.repository }}:$IMAGE_TAG
            docker image prune -a --filter 'until=24h' -f
          "

      - name: Verify deployment
        run: |
          sleep 10
          ssh ubuntu@$EC2_HOST "
            if docker ps | grep -q my-app-prod; then
              echo '✅ Container is running'
              docker logs --tail 20 my-app-prod
            else
              echo '❌ Container is not running'
              exit 1
            fi
          "
          curl -f http://$EC2_HOST/health || echo "⚠️ Health check not available"
          echo "✅ Deployed at http://$EC2_HOST"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa