# ===========================================================
# WORKFLOW NAME: Multi-Registry Docker Deployment
# ===========================================================
# Purpose: Builds a Docker image once and pushes to GHCR.
#          Deploys to EC2 with zero-downtime blue-green strategy.
# Future: Will also support ECS deployment when uncommented.
# ===========================================================

# -----------------------------------------------------------
# Workflow Name - Multi-Registry Docker Deployment
# The CI/CD pipeline builds a Docker image once and publishes it to both
# Amazon ECR and GitHub Container Registry (GHCR). This allows different
# deployment environments to pull the image from their preferred registry.
# FUTURE Solution: Multi-Repo Deployment Pipeline
# -----------------------------------------------------------

# Defines the display name shown in GitHub Actions UI
name: CI

# -----------------------------------------------------------
# Permissions - Added security-events for CodeQL
# Think of it as the workflow's security badge - GitHub checks these 
# before allowing any step that touches your repository or packages.
# Set too low, your workflow fails. Set too high (unnecessarily), 
# you create security risks. Your current settings match exactly 
# what your workflow needs.
# -----------------------------------------------------------
permissions:
  # Allows reading repository contents (needed for checkout)
  contents: read
  # Allows pushing container images to GitHub Container Registry
  packages: write           # For GHCR
  # Allows uploading security scan results to GitHub Security tab
  security-events: write    # Required for CodeQL to upload SARIF results
  # Allows saving artifacts (test results, scan reports)
  actions: read             # Required for actions/upload-artifact

# -----------------------------------------------------------
# Concurrency Control
# Prevents deployment chaos - ensures only one deployment runs per branch 
# at a time, always keeping the latest commit. Critical for EC2 deployments 
# where multiple processes can't safely modify the same server simultaneously.
# -----------------------------------------------------------

concurrency:
  # Groups runs by workflow name + branch reference
  # Example: "CI-main" groups all main branch runs together
  group: ${{ github.workflow }}-${{ github.ref }}
  # When a new run starts, immediately cancel any older runs in the same group
  cancel-in-progress: true


# -----------------------------------------------------------
# When This Workflow Runs
# Smart separation of concerns - test everything, but only build/deploy 
# when it matters. Prevents wasting resources on unnecessary builds for 
# PRs or develop branches while still validating code quality everywhere.
# -----------------------------------------------------------
on:
  # Runs when code is pushed to these branches
  push:
    branches: [main, develop]  # main = production, develop = integration
  # Runs when pull requests target main branch (validation before merge)
  pull_request:
    branches: [main]
  # Scheduled monthly maintenance run
  schedule:
      - cron: '0 0 1 * *'  # Run monthly on the 1st at midnight
    

# -----------------------------------------------------------
# Global Environment Variables
# -----------------------------------------------------------
# These variables are available to ALL jobs in this workflow
env:
  # AWS region where resources live
  AWS_DEFAULT_REGION: us-east-1
  # Name of the ECR repository (currently unused, for future)
  ECR_REPOSITORY: my-app
  # Unique image tag based on git commit SHA (ensures every build is unique)
  IMAGE_TAG: ${{ github.sha }}
  # HARDCODED EC2 instance ID - WARNING: This is stale/not used in deploy job
  # The deploy job overrides this by finding/creating its own instance
  EC2_INSTANCE_ID: i-0d4975574f8b5040b
  # Node environment for the running application
  NODE_ENV: production
  # Application name for identification
  APP_NAME: my-app
  # Port for the blue deployment environment
  BLUE_PORT: 8080
  # Port for the green deployment environment
  GREEN_PORT: 8081
  # Whether to assign a static Elastic IP which is a never changing public ip adress that can be attached  to your ip adress 
  # normally when you start o4 stop a ec2 instance aws gives it a new public ip, so if a user access somethign like http://54.123.45.67 
  # it breaks after restart but with a elastic the public ip stays the same
  # forever users can use one iurl that never changes, kinda simular to DNS but different because its uniq to a 
  # specifiuc server  (false = use auto-assigned public IP)
  USE_ELASTIC_IP: false  # Rob can override in repo vars


# -----------------------------------------------------------
# Jobs Section
# -----------------------------------------------------------
# Each job runs on a fresh virtual machine and executes a series of steps
jobs:

  # ---------------------------------------------------------
  # Job Name: Test and Lint
  # ---------------------------------------------------------
  # Purpose: Validate code quality and functionality before building
  # This runs on EVERY trigger (push, PR, schedule)
  test:
    name: test-and-lint  # Display name in GitHub Actions UI
    runs-on: ubuntu-latest  # Run on latest Ubuntu GitHub-hosted runner
    timeout-minutes: 15  # Kill job if it exceeds 15 minutes

    steps:
      # Step 1: Checkout code from repository
      - name: Checkout
        uses: actions/checkout@v4  # Official GitHub checkout action

      # Step 2: Create .env file for tests with mock database credentials
      # on push we create a env file in our repository 
      # with the same credentials as our docker compose file so when we run our tests it can connect to the database container using those credentials
      - name: Create env file for tests
        run: |
          echo "POSTGRES_USER=postgres" >> .env
          echo "POSTGREASSWORD=postgres" >> .env
          echo "POSTGRES_DB=mydb" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_HOST=db" >> .env
          echo "DATABASE_URL=postgresql://postgres:postgres@db:5432/mydb" >> .env

      # Step 3: Debug - print current branch/ref for logging using github.ref a built in github actions variable 
      # that containes git ref(branch or tag) that triggered the workflow so we can see in the logs which branch or tag is being tested
      - name: Debug branch
        run: |
           echo "Running on ref: ${{ github.ref }}"

      # Step 4: Setup Node.js with version 20 and npm caching
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20  # Node version to use
          cache: npm  # Cache node_modules for faster runs

      # Step 5: Clean install dependencies from package-lock.json
      - name: Clean install
        run: npm ci  # ci = clean install, respects lock file

      # Step 6: Generate Prisma client (type-safe database queries)
      - name: Generate Prisma client
      # run inside the app container to ensure it has access to the correct environment variables and dependencies for Prisma
        run: docker compose run --rm app npx prisma generate

      # Step 7: Run ESLint to catch code quality issues
      - name: Run linter
        run: |
          # Remove problematic ESLint plugins that might cause conflicts
          npm uninstall eslint-plugin-react eslint-plugin-react-hooks || true
          # Clean reinstall to ensure clean state
          rm -rf node_modules package-lock.json
          npm install
          # Print ESLint version for debugging
          npx eslint --version
          # Run ESLint on all JS/TS files, max 0 warnings (fail on any warning)
          npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings=0 || true

      # Step 8: Remove any existing Docker containers (clean slate)
      - name: Remove old containers
        run: docker compose down -v  # -v removes volumes too

      # Step 9: Build Docker containers defined in docker-compose.yml
      - name: Build test containers
        env:
          REPO_URL: "https://github.com/${{ github.repository }}.git"
          BRANCH: "${{ github.ref_name }}"
          DATABASE_URL: "${{ secrets.DATABASE_URL }}"  # ✅ Use secrets 
        run: |
         echo "REPO_URL=$REPO_URL"
         echo "BRANCH=$BRANCH"
         echo "DATABASE_URL=$DATABASE_URL"
         docker compose build

      # Step 10: Start all services in background
      - name: Start services
        run: docker compose up -d  # -d = detached mode

      # Step 11: Debug - print Docker versions and running containers
      - name: docker check services
        run: echo "docker --version && docker compose version && docker compose ps"

      # Step 12: Wait for PostgreSQL to be ready (max 10 attempts)
      - name: Wait for database
        run: |
          # Loop up to 10 times, 2 seconds between attempts
          for i in {1..10}; do
            # Check if PostgreSQL is ready using pg_isready command
            if docker compose exec -T db pg_isready -U postgres -d mydb; then
              echo "Database is ready ✅"
              exit 0  # Success, exit loop
            fi
            echo "Waiting for database..."
            sleep 2 
          done
          # If we exit loop, database never became ready
          echo "Database failed to start ❌"
          docker compose logs db  # Print database logs for debugging
          exit 1  # Fail the step

      # Step 13: Run database migrations using Prisma
      - name: Run migrations
        env:
          NODE_OPTIONS: "--max-old-space-size=512"  # Limit memory usage
          DATABASE_URL: postgresql://postgres:postgres@db:5432/mydb?schema=public
        #run prisma migrate directly inside the app container to ensure it has access to the correct environment variables and dependencies for Prisma, we use the same DATABASE_URL as our app container so it can connect to the database container and run the migrations against it, this ensures our database schema is up to date before we run our tests which depend on the database structure being correct
        run: docker compose run --rm app npx prisma migrate deploy
      
      # Step 14: Run the actual test suite
      - name: Run tests
        run: docker compose exec -T app npm test  # -T = disable pseudo-TTY

      # Step 15: Create directory for test results artifacts
      - name: Create test results directory
        if: always()  # Run even if previous steps failed
        run: mkdir -p test-results

      # Step 16: Upload test results as artifacts for later download
      - name: Upload test results
        if: always()  # Run even if previous steps failed
        uses: actions/upload-artifact@v4
        with:
          name: test-results  # Artifact name
          path: test-results/  # Directory to upload
          retention-days: 7  # Delete after 7 days

      # Step 17: Clean up - stop and remove all containers
      - name: Tear down
        if: always()  # Run even if previous steps failed
        run: docker compose down -v  # Remove containers and volumes

  # -----------------------------------------------------
  # Job Name: Build Application & Push Docker Image
  # -----------------------------------------------------
  # Purpose: Build Docker image once and push to container registry
  # Only runs on pushes to main AFTER tests pass
  build:
    name: Build app
    needs: test  # Wait for test job to complete successfully
    runs-on: ubuntu-latest
    # ONLY run on pushes to main (not on PRs or develop)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20  # Give builds extra time

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx (for multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Cache Docker layers to speed up subsequent builds
      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache  # Where cache is stored
          key: ${{ runner.os }}-buildx-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ github.ref }}-
            ${{ runner.os }}-buildx-

      # ECR steps commented out until permissions are sorted
      # Future: Will push to Amazon ECR as well
      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ${{ env.AWS_DEFAULT_REGION }}
      # 
      # - name: Login to Amazon ECR
      #   id: login-ecr
      #   uses: aws-actions/amazon-ecr-login@v2

      # Step 4: Login to GitHub Container Registry (GHCR)
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        #github.actor is the username or bot name who evr triggered the workflow or wherever activite on the workflow is coming from 
        #this creates a password for the github token and then we use that to login to the container registry so we can push our docker image there in the next step

      # Step 5: Build, tag, and push Docker image to GHCR
      - name: Build, tag, and push docker image to GHCR
        run: |
          # Debug: show current directory contents
          echo "Current directory: $(pwd)"
          echo "Files in current directory:"
          ls -la

          if [ -n "${{ secrets.REPO_URL }}" ]; then
            REPO_URL="${{ secrets.REPO_URL }}"
            echo "Using repository from secrets: $REPO_URL"
          else
            REPO_URL="https://github.com/${{ github.repository }}.git"
            echo "Using current repository: $REPO_URL"
          fi

          BRANCH="${{ github.ref_name }}"

          echo "Building with REPO_URL: $REPO_URL"
          echo "Building with BRANCH: $BRANCH"
                
          # Build the Docker image using Buildx with caching, platform specification and 2 tags
          # (one with the commit SHA and one with "latest" for easy reference)
          # REPO_URL and BRANCH are passed as build args so Docker can clone the code directly
          docker buildx build \
            --no-cache \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new \
            --build-arg REPO_URL="$REPO_URL" \
            --build-arg BRANCH="${{ github.ref_name }}" \
            --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --platform linux/amd64 \
            -t ghcr.io/${{ github.repository }}:$IMAGE_TAG \
            -t ghcr.io/${{ github.repository }}:latest \
            --push \
            .
    
          # Move cache to new location for next build
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Debug build arguments
        run: |
          echo "Checking REPO_URL secret:"
          if [ -n "${{ secrets.REPO_URL }}" ]; then
            echo "REPO_URL secret is set"
            REPO_URL="${{ secrets.REPO_URL }}"
          else
            echo "REPO_URL secret is NOT set, using current repo"
            REPO_URL="https://github.com/${{ github.repository }}.git"
          fi
          echo "Final REPO_URL: $REPO_URL"
          echo "BRANCH: ${{ github.ref_name }}"

      # Step 6: Scan Docker image for vulnerabilities using Trivy
      - name: Scan docker image for vulnerabilities
        id: trivy-scan  # ID allows referencing this step later
        if: success()  # Only run if build succeeded
        continue-on-error: true  # Don't fail workflow if scan finds issues
        uses: aquasecurity/trivy-action@master  # Latest version
        with:
          image-ref: ghcr.io/${{ github.repository }}:$IMAGE_TAG  # Image to scan image-tref specify the specific docker image we just built and pushed to GHCR
          format: 'sarif'  # SARIF = GitHub Security format
          output: 'trivy-results.sarif'  # Output file name where the results get written to
          severity: 'CRITICAL,HIGH'  # Only report critical and high severity
          exit-code: '0'  # Don't exit with error (we still want to see results) that trivy scanned for 

      # Step 7: Upload scan results to GitHub Security tab
      - name: Upload Trivy scan results to GitHub Security tab
        if: always() && steps.trivy-scan.outcome == 'success' && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with: 
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'  # label Categorize as trivy scan

      # Step 8: Upload scan results as artifact for download
      - name: Upload Trivy scan artifact
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 7

