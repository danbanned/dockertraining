# ----------------------------------------------------------- 
# Workflow Name - Multi-Registry Docker Deployment
# The CI/CD pipeline builds a Docker image once and publishes it to both
# Amazon ECR and GitHub Container Registry (GHCR). This allows different
# deployment environments to pull the image from their preferred registry.
# -----------------------------------------------------------
name: CI

# -----------------------------------------------------------
# Concurrency Control - FIX: Added to prevent multiple simultaneous deployments
# -----------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# -----------------------------------------------------------
# When This Workflow Runs
# -----------------------------------------------------------
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# -----------------------------------------------------------
# Global Environment Variables
# -----------------------------------------------------------
env:
  AWS_DEFAULT_REGION: us-east-1
  ECR_REPOSITORY: my-app
  IMAGE_TAG: ${{ github.sha }}
  # DATABASE_URL removed globally; test uses local .env, prod uses secrets
  EC2_INSTANCE_ID: i-1234567890abcdef0
  NODE_ENV: production  # default; overridden by test job

jobs:

  # ---------------------------------------------------------
  # Job Name: Test and Lint
  # ---------------------------------------------------------
  test:
    name: test-and-lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create env file for tests
        run: |
          echo "POSTGRES_USER=postgres" >> .env
          echo "POSTGRES_PASSWORD=postgres" >> .env
          echo "POSTGRES_DB=mydb" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_HOST=db" >> .env
          echo "DATABASE_URL=postgresql://postgres:postgres@db:5432/mydb" >> .env

      - name: Debug branch
        run: |
          echo "Running on ref: ${{ github.ref }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Clean install
        run: npm ci

      - name: Install Prisma CLI
        run: npm install -D prisma@latest

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run linter
        run: npm run lint

      - name: Remove old containers
        run: docker compose down -v

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: docker check services
        run: echo "docker --version && docker compose version && docker compose ps"

      - name: Wait for database
        run: |
          for i in {1..10}; do
            if docker compose exec -T db pg_isready -U postgres -d mydb; then
              echo "Database is ready ✅"
              exit 0
            fi
            echo "Waiting for database..."
            sleep 2
          done
          echo "Database failed to start ❌"
          docker compose logs db
          exit 1

      - name: Run migrations
        env:
          NODE_OPTIONS: "--max-old-space-size=512"
          DATABASE_URL: postgresql://postgres:postgres@db:5432/mydb?schema=public
        run: docker compose run --rm app npx prisma migrate deploy

      - name: Run tests
        run: docker compose exec -T dockertraining-app-1 npm test

      - name: Create test results directory
        if: always()
        run: mkdir -p test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose down -v

  # -----------------------------------------------------
  # Job Name: Build Application & Push Docker Image
  # -----------------------------------------------------
  build:
    name: Build app
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ github.ref }}-
            ${{ runner.os }}-buildx-

      # -----------------------------
      # AWS ECR steps commented out for later use
      # -----------------------------
      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      #     aws-region: ${{ env.AWS_DEFAULT_REGION }}

      # - name: Login to Amazon ECR
      #   id: login-ecr
      #   uses: aws-actions/amazon-ecr-login@v2

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build, tag, and push docker image
        run: |
          docker buildx build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new \
            --platform linux/amd64 \
            -t ghcr.io/${{ github.repository }}:$IMAGE_TAG \
            -t ghcr.io/${{ github.repository }}:latest \
            --push .

          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # -----------------------------------------------------
  # Job Name: Deploy to EC2
  # -----------------------------------------------------
  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Fetch EC2_HOST dynamically using AWS CLI and instance ID
      - name: Get EC2 public DNS dynamically
        id: ec2-info
        run: |
          INSTANCE_DNS=$(aws ec2 describe-instances \
            --instance-ids ${{ env.EC2_INSTANCE_ID }} \
            --query 'Reservations[0].Instances[0].PublicDnsName' \
            --output text)
          echo "EC2_HOST=$INSTANCE_DNS" >> $GITHUB_ENV

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh ubuntu@${{ env.EC2_HOST }} "
            docker pull ghcr.io/${{ github.repository }}:$IMAGE_TAG
            docker stop my-app-prod || true
            docker rm my-app-prod || true
            docker run -d \
              --name my-app-prod \
              --restart unless-stopped \
              -p 80:3000 \
              -e NODE_ENV=${{ env.NODE_ENV }} \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              ghcr.io/${{ github.repository }}:$IMAGE_TAG
            docker image prune -a --filter 'until=24h' -f
          "

      - name: Verify deployment
        run: |
          ssh ubuntu@${{ env.EC2_HOST }} "
            if docker ps | grep -q my-app-prod; then
              echo '✅ Container is running'
              docker logs --tail 20 my-app-prod
            else
              echo '❌ Container is not running'
              docker ps -a
              docker logs my-app-prod
              exit 1
            fi
          "
          curl -f http://${{ env.EC2_HOST }}/health || echo "Health check endpoint not available"

      - name: Deployment complete
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Successfully deployed to EC2 at http://${{ env.EC2_HOST }}"
          else
            echo "❌ Deployment to EC2 failed"
          fi

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa