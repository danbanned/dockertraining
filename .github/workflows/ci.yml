# ----------------------------------------------------------- 
# Workflow Name - Multi-Registry Docker Deployment
# The CI/CD pipeline builds a Docker image once and publishes it to both
# Amazon ECR and GitHub Container Registry (GHCR). This allows different
# deployment environments to pull the image from their preferred registry.
# -----------------------------------------------------------
name: CI

permissions:
  contents: read
  packages: write  # <-- This is the key permission for GHCR
  # ... other permissions

# -----------------------------------------------------------
# Concurrency Control - FIX: Added to prevent multiple simultaneous deployments
# -----------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# -----------------------------------------------------------
# When This Workflow Runs
# -----------------------------------------------------------
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# -----------------------------------------------------------
# Global Environment Variables
# -----------------------------------------------------------
env:
  AWS_DEFAULT_REGION: us-east-1
  ECR_REPOSITORY: my-app
  IMAGE_TAG: ${{ github.sha }}
  # DATABASE_URL removed globally; test uses local .env, prod uses secrets
  EC2_INSTANCE_ID: i-0d4975574f8b5040b
  NODE_ENV: production  # default; overridden by test job

jobs:

  # ---------------------------------------------------------
  # Job Name: Test and Lint
  # ---------------------------------------------------------
  test:
    name: test-and-lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create env file for tests
        run: |
          echo "POSTGRES_USER=postgres" >> .env
          echo "POSTGRES_PASSWORD=postgres" >> .env
          echo "POSTGRES_DB=mydb" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_HOST=db" >> .env
          echo "DATABASE_URL=postgresql://postgres:postgres@db:5432/mydb" >> .env

      - name: Debug branch
        run: |
          echo "Running on ref: ${{ github.ref }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Clean install
        run: npm ci

      - name: Install Prisma CLI
        run: npm install -D prisma@latest

      - name: Generate Prisma client
        run: docker compose run --rm app npx prisma generate

      - name: Run linter
        run: |
          # Remove any manually installed incompatible eslint packages
          npm uninstall eslint-plugin-react eslint-plugin-react-hooks || true

          # Install compatible ESLint and dependencies cleanly
          rm -rf node_modules package-lock.json
          npm install

          # Check ESLint version
          npx eslint --version

          # Run ESLint directly with Next.js recommended config
          npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings=0 || true        run: docker compose run --rm app npm run lint

      - name: Remove old containers
        run: docker compose down -v

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: docker check services
        run: echo "docker --version && docker compose version && docker compose ps"

      - name: Wait for database
        run: |
          for i in {1..10}; do
            if docker compose exec -T db pg_isready -U postgres -d mydb; then
              echo "Database is ready ✅"
              exit 0
            fi
            echo "Waiting for database..."
            sleep 2 
          done
          echo "Database failed to start ❌"
          docker compose logs db
          exit 1

      - name: Run migrations
        env:
          NODE_OPTIONS: "--max-old-space-size=512"
          DATABASE_URL: postgresql://postgres:postgres@db:5432/mydb?schema=public
        run: docker compose run --rm app npx prisma migrate deploy

      - name: Run tests
        run: docker compose exec -T app npm test

      - name: Create test results directory
        if: always()
        run: mkdir -p test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose down -v

  # -----------------------------------------------------
  # Job Name: Build Application & Push Docker Image
  # -----------------------------------------------------
  build:
    name: Build app
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ github.ref }}-
            ${{ runner.os }}-buildx-

      # -----------------------------
      # AWS ECR steps commented out for later use
      # -----------------------------
      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
      #     aws-region: ${{ env.AWS_DEFAULT_REGION }}

      # - name: Login to Amazon ECR
      #   id: login-ecr
      #   uses: aws-actions/amazon-ecr-login@v2

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build, tag, and push docker image
        run: |
          docker buildx build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new \
            --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --platform linux/amd64 \
            -t ghcr.io/${{ github.repository }}:$IMAGE_TAG \
            -t ghcr.io/${{ github.repository }}:latest \
            --push \
            .

          # Move cache for next run
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

# ------------------------------------------------
  # Job Name: Deploy to EC2
  # -----------------------------------------------------
  # -----------------------------------------------------
# Job Name: Deploy to EC2 (with automatic instance creation)
# -----------------------------------------------------
deploy:
  name: Deploy to EC2
  needs: build
  runs-on: ubuntu-latest
  if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  timeout-minutes: 20
  environment: production

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1️⃣ Install AWS CLI inside the GitHub runner
    - name: Install AWS CLI
      run: |
        sudo apt update
        sudo apt install awscli -y

    # 2️⃣ Configure AWS credentials in CI
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_DEFAULT_REGION }}

    # 3️⃣ Launch the EC2 instance automatically
    - name: Launch EC2 instance
      id: launch
      run: |
        INSTANCE_ID=$(aws ec2 run-instances \
          --image-id ami-0b6c6ebed2801a5cb \
          --count 1 \
          --instance-type t2.micro \
          --key-name "Ubuntu-Virtual-machine-Dannies" \
          --security-group-ids sg-0b971c14bd9b10e26 \
          --subnet-id subnet-0b66a114f97a51d2d \
          --query 'Instances[0].InstanceId' \
          --output text)

        echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
        echo "✅ Launched EC2 instance: $INSTANCE_ID"

    # 4️⃣ Wait for EC2 to start
    - name: Wait for EC2 to start
      run: |
        aws ec2 wait instance-running --instance-ids $INSTANCE_ID
        echo "✅ Instance is running"

    # 5️⃣ Get the EC2 public IP automatically
    - name: Get EC2 public IP
      run: |
        PUBLIC_IP=$(aws ec2 describe-instances \
          --instance-ids $INSTANCE_ID \
          --query 'Reservations[0].Instances[0].PublicIpAddress' \
          --output text)
        
        PUBLIC_DNS=$(aws ec2 describe-instances \
          --instance-ids $INSTANCE_ID \
          --query 'Reservations[0].Instances[0].PublicDnsName' \
          --output text)

        echo "EC2_HOST=$PUBLIC_IP" >> $GITHUB_ENV
        echo "EC2_DNS=$PUBLIC_DNS" >> $GITHUB_ENV
        echo "✅ EC2 IP: $PUBLIC_IP"
        echo "✅ EC2 DNS: $PUBLIC_DNS"

    # 6️⃣ Setup SSH connection
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts
        echo "✅ SSH configured"

    # 7️⃣ Install Docker on EC2 (first time)
    - name: Install Docker on EC2
      run: |
        ssh -o StrictHostKeyChecking=no ubuntu@$EC2_HOST "
          sudo apt update
          sudo apt install docker.io -y
          sudo systemctl start docker
          sudo systemctl enable docker
          sudo usermod -aG docker ubuntu
          echo '✅ Docker installed'
        "

    # 8️⃣ Deploy the Docker container
    - name: Deploy container
      run: |
        ssh ubuntu@$EC2_HOST "
          # Login to GHCR
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # Pull the image
          docker pull ghcr.io/${{ github.repository }}:$IMAGE_TAG

          # Stop and remove old container (if any)
          docker stop my-app-prod || true
          docker rm my-app-prod || true

          # Run the new container
          docker run -d \
            --name my-app-prod \
            --restart unless-stopped \
            -p 80:3000 \
            -e NODE_ENV=${{ env.NODE_ENV }} \
            -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
            -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
            ghcr.io/${{ github.repository }}:$IMAGE_TAG

          # Clean up old images
          docker image prune -a --filter 'until=24h' -f
          
          echo '✅ Container deployed'
        "

    # 9️⃣ Verify deployment
    - name: Verify deployment
      run: |
        # Wait a few seconds for the app to start
        sleep 10
        
        # Check if container is running
        ssh ubuntu@$EC2_HOST "
          if docker ps | grep -q my-app-prod; then
            echo '✅ Container is running'
            docker logs --tail 20 my-app-prod
          else
            echo '❌ Container is not running'
            docker ps -a
            docker logs my-app-prod
            exit 1
          fi
        "

        # Test HTTP endpoint
        curl -f http://$EC2_HOST/health || echo "⚠️ Health check endpoint not available"
        echo "✅ Deployment verified at http://$EC2_HOST"

    # 🔟 Deployment complete
    - name: Deployment complete
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Successfully deployed to EC2 at http://$EC2_HOST"
          echo "Instance ID: $INSTANCE_ID"
        else
          echo "❌ Deployment to EC2 failed"
        fi

    # Cleanup SSH key
    - name: Cleanup
      if: always()
      run: rm -f ~/.ssh/id_rsa